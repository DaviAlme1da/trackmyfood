spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

br.com.davi.trackmyfood.jwt.accessSecret=${JWT_ACCESS_SECRET}
br.com.davi.trackmyfood.jwt.accessExpiresIn=900
br.com.davi.trackmyfood.jwt.refreshSecret=${JWT_REFRESH_SECRET}
br.com.davi.trackmyfood.jwt.refreshExpiresIn=604800

spring.rabbitmq.host=${RABBITMQ_HOST:rabbit}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
ors.api-key=${ORS_API_KEY}